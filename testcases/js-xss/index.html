<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>XSS test case</title>
</head>
<body>
  <h1>Welcome</h1>
  <div id="greeting"></div>
  <div id="greeting_safe"></div>

  <script>
    // 漏洞点：URL 参数直接写入 innerHTML
    const params = new URLSearchParams(window.location.search);
    const name = params.get("name");                                  // source
    document.getElementById("greeting").innerHTML = "Hello, " + name; // sink (DOM XSS)

    // 漏洞点：使用 document.write 输出未净化的输入
    const greeting = params.get("greeting");
    document.write("<p>" + greeting + "</p>");                        // sink

    // 对照组：使用 textContent，不应被告警
    const safeName = params.get("safe_name");
    document.getElementById("greeting_safe").textContent = "Hello, " + safeName;
  </script>
</body>
</html>
